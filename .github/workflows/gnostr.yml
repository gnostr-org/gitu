name: gnostr

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master" ]
    types: [ opened, synchronize, reopened, closed ]
  issues:
    types: [ opened ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # NIP-05 well-known identifiers from https://github.com/gnostr-org/.github/blob/master/.well-known/nostr.json
  GNOSTR_PUB: "a34b99f22c790c4e36b2b3c2c35a36db06226e41c692fc82b8b56ac1c540c5bd"
  RANDYMCMILLAN_PUB: "edfa27d49d2af37ee331e1225bb6ed1912c6d999281b36d8018ad99bc3573c29"

jobs:
  gnostr:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache
      uses: actions/cache@v4
      with:
        path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
        key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cargo-binstall
      run: |
        curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

    - name: Install gnostr
      run: cargo binstall gnostr --no-confirm

    - name: gnostr --help
      shell: bash
      run: gnostr --help

    - name: gnostr custom-event --help
      shell: bash
      run: gnostr custom-event --help

    - name: gnostr set-metadata --help
      shell: bash
      run: gnostr set-metadata --help

    - name: gnostr query --help
      shell: bash
      run: gnostr query --help

    # NIP-0/1 kind:0 — publish a Nostr set_metadata event on every push to master.
    # Sets the profile metadata (name, picture, banner) for the Nostr identity associated with NOSTR_SEC.
    # See https://github.com/nostr-protocol/nips/blob/master/01.md and https://github.com/nostr-protocol/nips/blob/master/00.md
    - name: NIP-0/1 set-metadata event (push to master)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
        REPO_NAME: ${{ github.event.repository.name }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ]; then
          echo "NOSTR_SEC not configured — skipping NIP-0/1 kind:0 set-metadata event"
          exit 0
        fi
        # Demonstrate fetching NIP-05 well-known data and using it to set --nip05
        NIP05_IDENTIFIER="gnostr@gnostr-org.github.io"
        NIP05_URL="https://gnostr-org.github.io/.well-known/nostr.json"
        echo "Fetching NIP-05 well-known data from $NIP05_URL ..."
        NIP05_DATA=$(curl -sf "$NIP05_URL" 2>/dev/null || true)
        if [ -n "$NIP05_DATA" ] && echo "$NIP05_DATA" | python3 -m json.tool > /dev/null 2>&1; then
          echo "NIP-05 well-known data:"
          echo "$NIP05_DATA"
          NIP05_ARG="--nip05 $NIP05_IDENTIFIER"
        else
          echo "NIP-05 well-known data not available at $NIP05_URL — skipping --nip05"
          NIP05_ARG=""
        fi
        gnostr \
          --nsec "$NOSTR_SEC" \
          set-metadata \
          --name "$REPO_NAME" \
          -p "https://avatars.githubusercontent.com/u/135379339?s=400&u=11cb72cccbc2b13252867099546074c50caef1ae&v=4" \
          -b "https://raw.githubusercontent.com/gnostr-org/gnostr-icons/refs/heads/master/banner/1024x341.png" \
          $NIP05_ARG

    # NIP-34 kind:30617 — publish a Nostr repository announcement on every push to master.
    # Declares the repository's existence, clone URL, and metadata to the Nostr network.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 repository announcement (push to master)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
        NOSTR_PUB: ${{ secrets.NOSTR_PUB }}
        REPO_NAME: ${{ github.event.repository.name }}
        REPO_FULL_NAME: ${{ github.event.repository.full_name }}
        REPO_DESCRIPTION: ${{ github.event.repository.description }}
        REPO_HTML_URL: ${{ github.event.repository.html_url }}
        REPO_CLONE_URL: ${{ github.event.repository.clone_url }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ] || [ -z "$NOSTR_PUB" ]; then
          echo "NOSTR_SEC or NOSTR_PUB not configured — skipping NIP-34 kind:30617 repository announcement"
          exit 0
        fi
        EUC=$(git rev-list --max-parents=0 HEAD)
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 30617 \
          --content "" \
          --tags "d|$REPO_NAME" \
          --tags "name|$REPO_FULL_NAME" \
          --tags "description|$REPO_DESCRIPTION" \
          --tags "web|$REPO_HTML_URL" \
          --tags "clone|$REPO_CLONE_URL" \
          --tags "r|$EUC|euc"

    # NIP-34 kind:30618 — publish a Nostr repository state announcement on every push.
    # Tracks the current HEAD commit of the pushed branch or tag ref.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 repository state announcement (push)
      if: github.event_name == 'push'
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
        NOSTR_PUB: ${{ secrets.NOSTR_PUB }}
        REPO_NAME: ${{ github.event.repository.name }}
        GIT_REF: ${{ github.ref }}
        REF_NAME: ${{ github.ref_name }}
        HEAD_SHA: ${{ github.sha }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ] || [ -z "$NOSTR_PUB" ]; then
          echo "NOSTR_SEC or NOSTR_PUB not configured — skipping NIP-34 kind:30618 repository state announcement"
          exit 0
        fi
        if [[ "$GIT_REF" == refs/tags/* ]]; then
          REF_PATH="refs/tags/$REF_NAME"
        else
          REF_PATH="refs/heads/$REF_NAME"
        fi
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 30618 \
          --content "" \
          --tags "d|$REPO_NAME" \
          --tags "$REF_PATH|$HEAD_SHA" \
          --tags "HEAD|ref: $REF_PATH"

    # NIP-34 kind:1617 — publish a Nostr patch event when a pull request is opened or updated.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 patch event (pull_request opened/updated)
      if: github.event_name == 'pull_request' && github.event.action != 'closed'
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
        NOSTR_PUB: ${{ secrets.NOSTR_PUB }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_BASE_REF: ${{ github.base_ref }}
        REPO: ${{ github.repository }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ] || [ -z "$NOSTR_PUB" ]; then
          echo "NOSTR_SEC or NOSTR_PUB not configured — skipping NIP-34 kind:1617 patch event"
          exit 0
        fi
        REPO_NAME="${REPO##*/}"
        PATCH=$(git format-patch "origin/$PR_BASE_REF"...HEAD --stdout)
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 1617 \
          --content "$PATCH" \
          --tags "a|30617:$NOSTR_PUB:$REPO_NAME" \
          --tags "r|$PR_BASE_SHA" \
          --tags "t|root" \
          --tags "alt|git patch: PR #$PR_NUMBER: $PR_TITLE"

    # NIP-34 kind:1631 — publish a Nostr applied/merged status event when a pull request is merged.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 merged status event (pull_request merged)
      if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
        NOSTR_PUB: ${{ secrets.NOSTR_PUB }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        REPO: ${{ github.repository }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ] || [ -z "$NOSTR_PUB" ]; then
          echo "NOSTR_SEC or NOSTR_PUB not configured — skipping NIP-34 kind:1631 merged status event"
          exit 0
        fi
        REPO_NAME="${REPO##*/}"
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 1631 \
          --content "PR #$PR_NUMBER merged: $PR_TITLE" \
          --tags "a|30617:$NOSTR_PUB:$REPO_NAME" \
          --tags "merge-commit|$MERGE_SHA" \
          --tags "r|$MERGE_SHA" \
          --tags "alt|merged: PR #$PR_NUMBER: $PR_TITLE"

    # NIP-34 kind:1632 — publish a Nostr closed status event when a pull request is closed without merging.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 closed status event (pull_request closed without merge)
      if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
        NOSTR_PUB: ${{ secrets.NOSTR_PUB }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        REPO: ${{ github.repository }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ] || [ -z "$NOSTR_PUB" ]; then
          echo "NOSTR_SEC or NOSTR_PUB not configured — skipping NIP-34 kind:1632 closed status event"
          exit 0
        fi
        REPO_NAME="${REPO##*/}"
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 1632 \
          --content "PR #$PR_NUMBER closed: $PR_TITLE" \
          --tags "a|30617:$NOSTR_PUB:$REPO_NAME" \
          --tags "alt|closed: PR #$PR_NUMBER: $PR_TITLE"

    # NIP-34 kind:1621 — publish a Nostr issue event when a GitHub issue is opened.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 issue event (issues opened)
      if: github.event_name == 'issues' && github.event.action == 'opened'
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
        NOSTR_PUB: ${{ secrets.NOSTR_PUB }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
        ISSUE_TITLE: ${{ github.event.issue.title }}
        ISSUE_BODY: ${{ github.event.issue.body }}
        REPO: ${{ github.repository }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ] || [ -z "$NOSTR_PUB" ]; then
          echo "NOSTR_SEC or NOSTR_PUB not configured — skipping NIP-34 kind:1621 issue event"
          exit 0
        fi
        REPO_NAME="${REPO##*/}"
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 1621 \
          --content "$ISSUE_BODY" \
          --tags "a|30617:$NOSTR_PUB:$REPO_NAME" \
          --tags "subject|$ISSUE_TITLE" \
          --tags "alt|issue #$ISSUE_NUMBER: $ISSUE_TITLE"

    # Query steps — run after all NIP-34 events have been published so we retrieve
    # the events that were just sent from the network.

    # Query kind:1 (set-metadata) events for GNOSTR_PUB
    - name: gnostr query kind:1 set-metadata events
      continue-on-error: true
      timeout-minutes: 1
      shell: bash
      run: |
        gnostr query \
          --authors "$GNOSTR_PUB,$RANDYMCMILLAN_PUB" \
          --kinds 1 \
          --kinds 0 \
          --limit 10

    # Query kind:30617 (NIP-34 repository announcement) events for GNOSTR_PUB
    - name: gnostr query kind:30617 repository announcement events
      continue-on-error: true
      timeout-minutes: 1
      shell: bash
      run: |
        gnostr query \
          --authors "$GNOSTR_PUB,$RANDYMCMILLAN_PUB" \
          --kinds 30617 \
          --limit 10

    # Query kind:30618 (NIP-34 repository state announcement) events for GNOSTR_PUB
    - name: gnostr query kind:30618 repository state announcement events
      continue-on-error: true
      timeout-minutes: 1
      shell: bash
      run: |
        gnostr query \
          --authors "$GNOSTR_PUB,$RANDYMCMILLAN_PUB" \
          --kinds 30618 \
          --limit 10

    # Query kind:1617 (NIP-34 patch) events for GNOSTR_PUB
    - name: gnostr query kind:1617 patch events
      continue-on-error: true
      timeout-minutes: 1
      shell: bash
      run: |
        gnostr query \
          --authors "$GNOSTR_PUB,$RANDYMCMILLAN_PUB" \
          --kinds 1617 \
          --limit 10

    # Query kind:1621 (NIP-34 issue) events for GNOSTR_PUB
    - name: gnostr query kind:1621 issue events
      continue-on-error: true
      timeout-minutes: 1
      shell: bash
      run: |
        gnostr query \
          --authors "$GNOSTR_PUB,$RANDYMCMILLAN_PUB" \
          --kinds 1621 \
          --limit 10

    # Query kind:1631 (NIP-34 merged status) events for GNOSTR_PUB
    - name: gnostr query kind:1631 merged status events
      continue-on-error: true
      timeout-minutes: 1
      shell: bash
      run: |
        gnostr query \
          --authors "$GNOSTR_PUB,$RANDYMCMILLAN_PUB" \
          --kinds 1631 \
          --limit 10

    # Query kind:1632 (NIP-34 closed status) events for GNOSTR_PUB
    - name: gnostr query kind:1632 closed status events
      continue-on-error: true
      timeout-minutes: 1
      shell: bash
      run: |
        gnostr query \
          --authors "$GNOSTR_PUB,$RANDYMCMILLAN_PUB" \
          --kinds 1632 \
          --limit 10
