name: gnostr

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "master" ]
    types: [ opened, synchronize, reopened, closed ]
  issues:
    types: [ opened ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  gnostr:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Cache
      uses: actions/cache@v4
      with:
        path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
        key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Install cargo-binstall
      run: |
        curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

    - name: Install gnostr
      run: cargo binstall gnostr --no-confirm

    - name: gnostr --help
      shell: bash
      run: gnostr --help

    - name: gnostr custom-event --help
      shell: bash
      run: gnostr custom-event --help

    # NIP-34 kind:30617 — publish a Nostr repository announcement on every push to master.
    # Declares the repository's existence, clone URL, and metadata to the Nostr network.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 repository announcement (push to master)
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ]; then
          echo "NOSTR_SEC not configured — skipping NIP-34 kind:30617 repository announcement"
          exit 0
        fi
        EUC=$(git rev-list --max-parents=0 HEAD)
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 30617 \
          --content "" \
          --tags "d|${{ github.event.repository.name }}" \
          --tags "name|${{ github.event.repository.full_name }}" \
          --tags "description|${{ github.event.repository.description }}" \
          --tags "web|${{ github.event.repository.html_url }}" \
          --tags "clone|${{ github.event.repository.clone_url }}" \
          --tags "r|$EUC|euc"

    # NIP-34 kind:30618 — publish a Nostr repository state announcement on every push.
    # Tracks the current HEAD commit of the pushed branch or tag ref.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 repository state announcement (push)
      if: github.event_name == 'push'
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ]; then
          echo "NOSTR_SEC not configured — skipping NIP-34 kind:30618 repository state announcement"
          exit 0
        fi
        REF_NAME="${{ github.ref_name }}"
        HEAD_SHA="${{ github.sha }}"
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          REF_PATH="refs/tags/$REF_NAME"
        else
          REF_PATH="refs/heads/$REF_NAME"
        fi
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 30618 \
          --content "" \
          --tags "d|${{ github.event.repository.name }}" \
          --tags "$REF_PATH|$HEAD_SHA" \
          --tags "HEAD|ref: $REF_PATH"

    # NIP-34 kind:1617 — publish a Nostr patch event when a pull request is opened or updated.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 patch event (pull_request opened/updated)
      if: github.event_name == 'pull_request' && github.event.action != 'closed'
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ]; then
          echo "NOSTR_SEC not configured — skipping NIP-34 kind:1617 patch event"
          exit 0
        fi
        PATCH=$(git format-patch origin/${{ github.base_ref }}...HEAD --stdout)
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 1617 \
          --content "$PATCH" \
          --tags "a|30617:${{ github.repository }}" \
          --tags "r|${{ github.event.pull_request.base.sha }}" \
          --tags "t|root" \
          --tags "alt|git patch: PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

    # NIP-34 kind:1631 — publish a Nostr applied/merged status event when a pull request is merged.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 merged status event (pull_request merged)
      if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ]; then
          echo "NOSTR_SEC not configured — skipping NIP-34 kind:1631 merged status event"
          exit 0
        fi
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 1631 \
          --content "PR #${{ github.event.pull_request.number }} merged: ${{ github.event.pull_request.title }}" \
          --tags "a|30617:${{ github.repository }}" \
          --tags "merge-commit|${{ github.event.pull_request.merge_commit_sha }}" \
          --tags "r|${{ github.event.pull_request.merge_commit_sha }}" \
          --tags "alt|merged: PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

    # NIP-34 kind:1632 — publish a Nostr closed status event when a pull request is closed without merging.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 closed status event (pull_request closed without merge)
      if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ]; then
          echo "NOSTR_SEC not configured — skipping NIP-34 kind:1632 closed status event"
          exit 0
        fi
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 1632 \
          --content "PR #${{ github.event.pull_request.number }} closed: ${{ github.event.pull_request.title }}" \
          --tags "a|30617:${{ github.repository }}" \
          --tags "alt|closed: PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"

    # NIP-34 kind:1621 — publish a Nostr issue event when a GitHub issue is opened.
    # See https://github.com/nostr-protocol/nips/blob/master/34.md
    - name: NIP-34 issue event (issues opened)
      if: github.event_name == 'issues' && github.event.action == 'opened'
      env:
        NOSTR_SEC: ${{ secrets.NOSTR_SEC }}
      shell: bash
      run: |
        if [ -z "$NOSTR_SEC" ]; then
          echo "NOSTR_SEC not configured — skipping NIP-34 kind:1621 issue event"
          exit 0
        fi
        gnostr \
          --nsec "$NOSTR_SEC" \
          custom-event \
          --kind 1621 \
          --content "${{ github.event.issue.body }}" \
          --tags "a|30617:${{ github.repository }}" \
          --tags "subject|${{ github.event.issue.title }}" \
          --tags "alt|issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
